<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flow Mode</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-brand">
        <img src="../icons/icon48.png" alt="" class="header-logo" width="24" height="24">
        <h1>Flow Mode</h1>
      </div>
      <p class="subtitle">Block distractions, stay in flow</p>
      <button type="button" class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </header>

    <section class="add-site">
      <div class="input-group">
        <input 
          type="text" 
          id="urlInput" 
          placeholder="Enter domain (e.g., youtube.com)"
          autocomplete="off"
        >
        <button id="addBtn" class="btn-primary">Add</button>
      </div>
    </section>

    <section class="sites-list">
      <div class="sites-header">
        <span class="sites-count" id="sitesCount"></span>
        <div class="view-toggle" id="viewToggle">
          <button class="view-btn active" data-view="list" title="List view">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
              <rect x="1" y="2" width="14" height="2" rx="0.5"/>
              <rect x="1" y="7" width="14" height="2" rx="0.5"/>
              <rect x="1" y="12" width="14" height="2" rx="0.5"/>
            </svg>
          </button>
          <button class="view-btn" data-view="card" title="Card view">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
              <rect x="1" y="1" width="6" height="6" rx="1"/>
              <rect x="9" y="1" width="6" height="6" rx="1"/>
              <rect x="1" y="9" width="6" height="6" rx="1"/>
              <rect x="9" y="9" width="6" height="6" rx="1"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="emptyState" class="empty-state">
        <p>No sites blocked yet</p>
        <p class="hint">Add a domain above to get started</p>
      </div>
      <ul id="sitesList" class="list-view"></ul>
    </section>

    <footer class="made-by">
      made by: <a href="https://x.com/CoenHees" target="_blank" rel="noopener">@coenhees</a>
    </footer>
  </div>

  <template id="siteTemplate">
    <li class="site-item">
      <div class="site-header">
        <div class="site-domain-wrapper">
          <span class="drag-handle" title="Drag to reorder">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
              <circle cx="3" cy="2" r="1.2"/>
              <circle cx="9" cy="2" r="1.2"/>
              <circle cx="3" cy="6" r="1.2"/>
              <circle cx="9" cy="6" r="1.2"/>
              <circle cx="3" cy="10" r="1.2"/>
              <circle cx="9" cy="10" r="1.2"/>
            </svg>
          </span>
          <span class="site-domain"></span>
        </div>
        <div class="site-header-right">
          <span class="site-status-badge"></span>
          <button type="button" class="btn-delete" title="Remove site" aria-label="Remove site">
            <svg class="btn-delete-icon" width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M2.5 2.5l7 7M9.5 2.5l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="site-summary">
        <span class="summary-usage"></span>
        <span class="summary-dot">·</span>
        <span class="summary-time"></span>
        <span class="summary-dot">·</span>
        <span class="summary-mode"></span>
      </div>
      <div class="site-controls">
        <div class="site-controls-inner">
          <div class="time-control">
            <label>
              <span class="time-label">Daily limit:</span>
              <span class="time-value"></span>
            </label>
            <input type="range" class="time-slider" min="0" max="60" step="5" value="30">
          </div>
          <div class="progress-container">
            <div class="progress-bar">
              <div class="progress-fill"></div>
            </div>
            <span class="progress-text"></span>
          </div>
          <div class="mode-description"></div>
          <div class="day-picker">
            <span class="day-picker-label">Active days</span>
            <div class="day-picker-days">
              <button type="button" class="day-btn" data-day="1">M</button>
              <button type="button" class="day-btn" data-day="2">T</button>
              <button type="button" class="day-btn" data-day="3">W</button>
              <button type="button" class="day-btn" data-day="4">T</button>
              <button type="button" class="day-btn" data-day="5">F</button>
              <button type="button" class="day-btn" data-day="6">S</button>
              <button type="button" class="day-btn" data-day="0">S</button>
            </div>
          </div>
        </div>
      </div>
    </li>
  </template>

  <div class="modal-overlay hidden" id="dayToggleModal">
    <div class="modal">
      <div class="modal-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 9v4m0 4h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="modal-title">Already changed today</p>
      <p class="modal-message">You've already toggled a day for <strong id="modalDomain"></strong> today. Are you sure you want to change it again?</p>
      <div class="modal-actions">
        <button type="button" class="modal-btn modal-btn-cancel" id="modalCancel">Cancel</button>
        <button type="button" class="modal-btn modal-btn-confirm" id="modalConfirm">Change anyway</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
