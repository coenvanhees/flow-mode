<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Blocked - Flow Mode</title>
  <link rel="stylesheet" href="blocked.css">
</head>
<body>
  <div class="container">
    <div class="blocked-brand">
      <img src="../icons/icon48.png" alt="" class="blocked-brand-logo" width="24" height="24">
      <span class="blocked-brand-name">Flow Mode</span>
    </div>
    <div class="icon">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M4.93 4.93l14.14 14.14"/>
      </svg>
    </div>
    
    <p class="message">
      <span id="domainName" class="domain"></span> is blocked to help you stay in flow.
    </p>
    
    <div id="limitInfo" class="info-box limit-info hidden">
      <p>You've used your daily limit of <span id="dailyLimit"></span> minutes. This site is blocked until tomorrow.</p>
    </div>
    
    <div class="quote">
      <p id="motivationalQuote"></p>
    </div>
    
    <div class="actions">
      <button id="goBackBtn" class="btn btn-primary">Go Back</button>
      <a href="https://google.com" class="btn btn-secondary">Go to Google</a>
    </div>
    
    <p class="hint">Manage your blocked sites in the Flow Mode extension popup.</p>
  </div>

  <script src="blocked.js"></script>
</body>
</html>
